services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: jobs_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d jobs_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ./downloads:/app/downloads
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/jobs_tracker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "uv sync --frozen &&
             uv run uvicorn src.main:app --host 0.0.0.0 --port 8000"

  watcher:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
      - ./downloads:/app/downloads
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/jobs_tracker
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "uv sync --frozen &&
             uv run python -m src.watcher"

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    env_file: .env
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
