<div>
  <h2 class="font-semibold text-base text-gray-900 mb-4">Add a Job</h2>

  <form
    hx-post="/jobs"
    hx-target="#stats-bar"
    hx-swap="innerHTML"
    hx-on::after-request="if(event.detail.successful) this.reset()"
  >
    <div class="grid grid-cols-2 gap-2 mb-3">
      <div>
        <label class="block text-xs text-gray-500 mb-0.5">Title *</label>
        <input name="title" required
               class="w-full text-sm border border-gray-200 rounded px-2 py-1.5 focus:outline-none focus:border-blue-400">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-0.5">Company *</label>
        <input name="company" required
               class="w-full text-sm border border-gray-200 rounded px-2 py-1.5 focus:outline-none focus:border-blue-400">
      </div>
    </div>

    <div class="mb-3">
      <label class="block text-xs text-gray-500 mb-0.5">Job URL *</label>
      <input name="job_url" required type="url"
             class="w-full text-sm border border-gray-200 rounded px-2 py-1.5 focus:outline-none focus:border-blue-400">
    </div>

    <div class="grid grid-cols-2 gap-2 mb-3">
      <div>
        <label class="block text-xs text-gray-500 mb-0.5">Location</label>
        <input name="location"
               class="w-full text-sm border border-gray-200 rounded px-2 py-1.5 focus:outline-none focus:border-blue-400">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-0.5">Date Posted</label>
        <input name="date_posted" type="date"
               class="w-full text-sm border border-gray-200 rounded px-2 py-1.5 focus:outline-none focus:border-blue-400">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-2 mb-3">
      <div>
        <label class="block text-xs text-gray-500 mb-0.5">Experience req</label>
        <input name="experience_req" placeholder="e.g. 2–4 yrs"
               class="w-full text-sm border border-gray-200 rounded px-2 py-1.5 focus:outline-none focus:border-blue-400">
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-0.5">Status</label>
        <select name="status"
                class="w-full text-sm border border-gray-200 rounded px-2 py-1.5 focus:outline-none focus:border-blue-400">
          {% for s in statuses %}
          <option value="{{ s }}" {{ 'selected' if s == 'applied' else '' }}>
            {{ status_emoji[s] }} {{ s.replace('_', ' ').title() }}
          </option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="mb-3">
      <label class="flex items-center gap-2 text-xs text-gray-500 cursor-pointer">
        <input name="entry_level" type="checkbox" value="true"
               class="rounded border-gray-300">
        Entry-level role
      </label>
    </div>

    <div class="mb-3">
      <label class="block text-xs text-gray-500 mb-0.5">Description</label>
      <textarea name="description" rows="3"
                class="w-full text-sm border border-gray-200 rounded px-2 py-1.5 resize-none focus:outline-none focus:border-blue-400"></textarea>
    </div>

    <div class="mb-4">
      <label class="block text-xs text-gray-500 mb-0.5">Notes</label>
      <textarea name="notes" rows="2"
                class="w-full text-sm border border-gray-200 rounded px-2 py-1.5 resize-none focus:outline-none focus:border-blue-400"></textarea>
    </div>

    <button type="submit"
            class="w-full text-sm bg-blue-600 hover:bg-blue-700 text-white rounded py-2 font-medium">
      Add Job
    </button>
  </form>
</div>
